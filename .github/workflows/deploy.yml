name: Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Netlify (production)
        # --functions is required so the token BFF (netlify/functions/) ships; --no-build skips
        # framework build but functions are still bundled from this dir at deploy time.
        run: npx -y netlify-cli@latest deploy --prod --no-build --dir=dist --functions=netlify/functions --site="$NETLIFY_SITE_ID"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: fa792c78-0108-4e3c-b89c-24d7dcdbf516
