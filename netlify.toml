[build]
  command = "pnpm install && pnpm build"
  publish = "dist"

[build.environment]
  VITE_API_BASE_URL = "https://openct-api.onrender.com"
  VITE_AUTH_BASE_URL = "https://openct-auth.onrender.com"
  VITE_PROJECT_KEY = "personal"

# The OAuth client secret is NOT a build/Vite var (those end up in the public bundle). It is held
# server-side by the token BFF below and set as a *runtime* env var in the Netlify dashboard:
#   CLIENT_SECRET (required), and optionally CLIENT_ID / PROJECT_KEY / AUTH_BASE_URL.

[functions]
  directory = "netlify/functions"

# Same-origin token BFF: the browser GETs /api/token and the function performs the
# client_credentials grant server-side. Must precede the SPA catch-all (specific rules first).
[[redirects]]
  from = "/api/token"
  to = "/.netlify/functions/token"
  status = 200

# SPA fallback so client-side routes (e.g. /product/:slug) resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
